<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RADCORE Touch Icon</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #10263a;
    }

    .frame {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #10263a;
    }

    .logo-shell {
      width: 468px;
      height: 480px;
      display: grid;
      place-items: center;
      transform: translateX(-1px);
    }

    .logo-shell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: none;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="logo-shell">
      <img src="./home-logo.svg" alt="RADCORE logo" />
    </div>
  </div>
</body>
</html>
